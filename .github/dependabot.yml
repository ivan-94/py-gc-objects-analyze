version: 2
updates:
  - package-ecosystem: github-actions
    directory: /
    schedule:
      interval: weekly
    groups:
      github-actions-minor:
        update-types:
          - minor
          - patch

  - package-ecosystem: cargo
    directory: /
    schedule:
      interval: weekly
    groups:
      cargo-minor:
        update-types:
          - minor
          - patch

  - package-ecosystem: npm
    directory: /web/app
    schedule:
      interval: weekly
    groups:
      web-minor:
        update-types:
          - minor
          - patch

  - package-ecosystem: pip
    directory: /python/pygco_dump
    schedule:
      interval: weekly
    groups:
      python-minor:
        update-types:
          - minor
          - patch
