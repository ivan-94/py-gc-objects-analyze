name: Memory investigation feedback
description: Share feedback from using pygco on a real or synthetic investigation.
title: "[Diagnostic feedback]: "
labels: ["type: diagnostic-feedback"]
body:
  - type: input
    id: version
    attributes:
      label: pygco version
      placeholder: "0.1.0"
  - type: textarea
    id: scenario
    attributes:
      label: Scenario
      description: What were you investigating?
    validations:
      required: true
  - type: textarea
    id: workflow
    attributes:
      label: Commands or Web UI pages used
      render: shell
  - type: textarea
    id: helpful
    attributes:
      label: What helped?
  - type: textarea
    id: confusing
    attributes:
      label: What was missing or confusing?
  - type: textarea
    id: dump_shape
    attributes:
      label: Dump source shape
      description: Share high-level shape only. Do not attach private dumps unless they are safe to publish.
  - type: checkboxes
    id: privacy
    attributes:
      label: Data safety
      options:
        - label: I have not attached private or sensitive dump data.
          required: true
