name: Feature request
description: Propose a user-visible feature or workflow improvement.
title: "[Feature]: "
labels: ["type: feature"]
body:
  - type: textarea
    id: problem
    attributes:
      label: Problem
      description: What memory investigation workflow is hard today?
    validations:
      required: true
  - type: textarea
    id: proposal
    attributes:
      label: Proposed behavior
    validations:
      required: true
  - type: textarea
    id: alternatives
    attributes:
      label: Alternatives considered
  - type: checkboxes
    id: impact
    attributes:
      label: Impact area
      options:
        - label: CLI contract
        - label: Python producer
        - label: SQLite schema
        - label: Local API
        - label: Web UI
        - label: Reports
        - label: Release/install flow
