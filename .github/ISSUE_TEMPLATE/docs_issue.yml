name: Documentation issue
description: Report stale, missing, or confusing documentation.
title: "[Docs]: "
labels: ["type: docs"]
body:
  - type: input
    id: page
    attributes:
      label: Page or section
      placeholder: "docs/install.md"
    validations:
      required: true
  - type: textarea
    id: problem
    attributes:
      label: Problem
    validations:
      required: true
  - type: textarea
    id: suggested
    attributes:
      label: Suggested fix
