name: ci

on:
  push:
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - uses: pnpm/action-setup@v4
        with:
          version: 11.7.0
      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: pnpm
          cache-dependency-path: web/app/pnpm-lock.yaml
      - run: cargo fmt --check
      - run: cargo clippy --all-targets --all-features -- -D warnings
      - run: cargo test --workspace
      - run: cargo build -p pygco-cli
      - run: mkdir -p .scratch
      - run: python fixtures/generators/generate_synthetic.py --objects 200 --fanout 2 --output .scratch/bench-smoke.jsonl.gz
      - run: python benches/import_benchmark.py --dump .scratch/bench-smoke.jsonl.gz --keep-db .scratch/bench-smoke.sqlite
      - run: python benches/query_api_benchmark.py --db .scratch/bench-smoke.sqlite --iterations 3
      - run: python -m pip install -e "python/pygco_dump[fastapi,test]"
      - run: python -m pytest python/pygco_dump
      - run: pnpm --dir web/app install --frozen-lockfile
      - run: pnpm --dir web/app typecheck
      - run: pnpm --dir web/app build
      - run: pnpm --dir web/app exec playwright install --with-deps chromium
      - run: pnpm --dir web/app test:e2e
