name: release

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:
    inputs:
      tag:
        description: "Existing tag to package, for example v0.1.0"
        required: true

permissions:
  contents: write

jobs:
  linux-artifact:
    name: build linux x86_64
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: x86_64-unknown-linux-gnu
      - uses: pnpm/action-setup@v4
        with:
          version: 11.7.0
      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: pnpm
          cache-dependency-path: web/app/pnpm-lock.yaml
      - name: Resolve version
        id: version
        shell: bash
        run: |
          tag="${GITHUB_REF_NAME}"
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            tag="${{ inputs.tag }}"
          fi
          echo "version=${tag#v}" >> "$GITHUB_OUTPUT"
      - run: pnpm --dir web/app install --frozen-lockfile
      - run: pnpm --dir web/app build
      - name: Build release binary
        run: PYGCO_WEB_DIST="$PWD/web/app/dist" cargo build --release -p pygco-cli --target x86_64-unknown-linux-gnu
      - name: Smoke binary
        shell: bash
        run: |
          binary="target/x86_64-unknown-linux-gnu/release/pygco"
          "$binary" version
          if strings "$binary" | grep -q "Build web/app/dist before release"; then
            echo "release binary embedded fallback Web UI"
            exit 1
          fi
          "$binary" import fixtures/golden/tiny-v1.jsonl.gz -o "smoke-x86_64-unknown-linux-gnu.sqlite" --rebuild
      - name: Package archive
        run: scripts/package_release.sh "${{ steps.version.outputs.version }}" x86_64-unknown-linux-gnu
      - uses: actions/upload-artifact@v4
        with:
          name: release-linux
          path: |
            dist/pygco-${{ steps.version.outputs.version }}-x86_64-unknown-linux-gnu.tar.gz
            dist/pygco-${{ steps.version.outputs.version }}-x86_64-unknown-linux-gnu.tar.gz.sha256

  macos-artifacts:
    name: build macos artifacts
    runs-on: macos-14
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - run: rustup target add aarch64-apple-darwin x86_64-apple-darwin
      - uses: pnpm/action-setup@v4
        with:
          version: 11.7.0
      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: pnpm
          cache-dependency-path: web/app/pnpm-lock.yaml
      - name: Resolve version
        id: version
        shell: bash
        run: |
          tag="${GITHUB_REF_NAME}"
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            tag="${{ inputs.tag }}"
          fi
          echo "version=${tag#v}" >> "$GITHUB_OUTPUT"
      - run: pnpm --dir web/app install --frozen-lockfile
      - run: pnpm --dir web/app build
      - name: Build, smoke, and package macOS archives
        shell: bash
        run: |
          host="$(rustc -vV | awk '/^host:/ {print $2}')"
          for target in aarch64-apple-darwin x86_64-apple-darwin; do
            PYGCO_WEB_DIST="$PWD/web/app/dist" cargo build --release -p pygco-cli --target "$target"
            binary="target/$target/release/pygco"
            file "$binary"
            if strings "$binary" | grep -q "Build web/app/dist before release"; then
              echo "release binary embedded fallback Web UI for $target"
              exit 1
            fi
            if [ "$target" = "$host" ]; then
              "$binary" version
              "$binary" import fixtures/golden/tiny-v1.jsonl.gz -o "smoke-$target.sqlite" --rebuild
            else
              echo "built cross-target $target on host $host; runtime smoke is covered by HAT"
            fi
            scripts/package_release.sh "${{ steps.version.outputs.version }}" "$target"
          done
      - uses: actions/upload-artifact@v4
        with:
          name: release-macos
          path: |
            dist/pygco-${{ steps.version.outputs.version }}-aarch64-apple-darwin.tar.gz
            dist/pygco-${{ steps.version.outputs.version }}-aarch64-apple-darwin.tar.gz.sha256
            dist/pygco-${{ steps.version.outputs.version }}-x86_64-apple-darwin.tar.gz
            dist/pygco-${{ steps.version.outputs.version }}-x86_64-apple-darwin.tar.gz.sha256

  publish-draft:
    runs-on: ubuntu-latest
    needs:
      - linux-artifact
      - macos-artifacts
    steps:
      - uses: actions/checkout@v4
      - uses: actions/download-artifact@v4
        with:
          path: dist
          merge-multiple: true
      - name: Resolve release tag and version
        id: release
        shell: bash
        run: |
          tag="${GITHUB_REF_NAME}"
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            tag="${{ inputs.tag }}"
          fi
          echo "tag=$tag" >> "$GITHUB_OUTPUT"
          echo "version=${tag#v}" >> "$GITHUB_OUTPUT"
      - name: Stamp installer and checksums
        shell: bash
        run: |
          sed "s/__PYGCO_VERSION__/${{ steps.release.outputs.version }}/g" scripts/install.sh > dist/install.sh
          chmod 755 dist/install.sh
          (cd dist && sha256sum pygco-*.tar.gz > checksums.txt)
      - name: Create draft GitHub Release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          gh release create "${{ steps.release.outputs.tag }}" dist/* \
            --draft \
            --verify-tag \
            --title "${{ steps.release.outputs.tag }}" \
            --notes-file CHANGELOG.md
