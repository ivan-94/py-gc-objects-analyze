name: publish-python

on:
  workflow_dispatch:
    inputs:
      target:
        description: "Publish target"
        required: true
        default: "testpypi"
        type: choice
        options:
          - testpypi
          - pypi

permissions:
  contents: read
  id-token: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - run: python -m pip install --upgrade pip build twine
      - run: cd python/pygco_dump && python -m build
      - run: python -m twine check python/pygco_dump/dist/*
      - name: Test built wheel
        shell: bash
        run: |
          python -m venv .scratch/wheel-venv
          . .scratch/wheel-venv/bin/activate
          wheel="$(ls python/pygco_dump/dist/*.whl)"
          python -m pip install "${wheel}[fastapi]"
          python - <<'PY'
          from pygco_dump import write_gc_dump
          from pygco_dump.fastapi import gc_heap_dump_route
          assert callable(write_gc_dump)
          assert callable(gc_heap_dump_route)
          PY
      - uses: actions/upload-artifact@v4
        with:
          name: pygco-dump-dist
          path: python/pygco_dump/dist/*

  publish-testpypi:
    runs-on: ubuntu-latest
    needs: build
    if: github.event_name == 'workflow_dispatch' && inputs.target == 'testpypi'
    environment:
      name: testpypi
      url: https://test.pypi.org/p/pygco-dump
    steps:
      - uses: actions/download-artifact@v4
        with:
          name: pygco-dump-dist
          path: dist
      - uses: pypa/gh-action-pypi-publish@release/v1
        with:
          repository-url: https://test.pypi.org/legacy/
          packages-dir: dist

  publish-pypi:
    runs-on: ubuntu-latest
    needs: build
    if: github.event_name == 'workflow_dispatch' && inputs.target == 'pypi'
    environment:
      name: pypi
      url: https://pypi.org/p/pygco-dump
    steps:
      - uses: actions/download-artifact@v4
        with:
          name: pygco-dump-dist
          path: dist
      - uses: pypa/gh-action-pypi-publish@release/v1
        with:
          packages-dir: dist
